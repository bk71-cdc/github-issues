name: Auto-Populate Projects Fields

on:
  issues:
    types: [opened]

jobs:
  populate-project-fields:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse form data and populate projects
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const body = issue.body;
            
            console.log('📝 Processing issue #' + issue.number + ' (Repository-level query v2)');
            
            // Parse form data
            const parseField = (fieldName) => {
              const patterns = [
                new RegExp(`### ${fieldName}\\n\\n([^\n]+)`),
                new RegExp(`\\*\\*${fieldName}\\*\\*:\\s*([^\n]+)`),
              ];
            
              for (const pattern of patterns) {
                const match = body.match(pattern);
                if (match) {
                  const value = match[1].trim();
                  if (value && value !== '_No response_') {
                    return value;
                  }
                }
              }
              return null;
            };
            
            const projectValue = parseField('Project');
            const priorityValue = parseField('Priority');
            const affectsVersion = parseField('Affects Version/s') || parseField('Affects Version');
            const fixVersion = parseField('Fix Version/s') || parseField('Fix Version');
            
            console.log('✅ Extracted Values:');
            console.log('  Project:', projectValue);
            console.log('  Priority:', priorityValue);
            console.log('  Affects Version:', affectsVersion);
            console.log('  Fix Version:', fixVersion);
            
            // Query repository-level projects
            const query = `
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      title
                      fields(first: 30) {
                        nodes {
                          ... on ProjectV2FieldCommon {
                            id
                            name
                          }
                          ... on ProjectV2SingleSelectField {
                            id
                            name
                            options {
                              id
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const projects = result.repository.projectsV2.nodes;
            console.log('🏢 Found projects:', projects.map(p => p.title).join(', '));
            
            const targetProject = projects.find(p => p.title === 'GitHub_Jira');
            
            if (!targetProject) {
              console.log('❌ GitHub_Jira project not found');
              return;
            }
            
            console.log('✅ Found project: GitHub_Jira');
            console.log('📋 Available fields:', targetProject.fields.nodes.map(f => f.name).join(', '));
            
            // Add issue to project
            try {
              const addItemMutation = `
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item {
                      id
                    }
                  }
                }
              `;
            
              const addItemResult = await github.graphql(addItemMutation, {
                projectId: targetProject.id,
                contentId: issue.node_id
              });
            
              var itemId = addItemResult.addProjectV2ItemById.item.id;
              console.log('✅ Issue added to project with item ID:', itemId);
            } catch (error) {
              console.log('⚠️ Error adding to project:', error.message);
              return;
            }
            
            // Helper to update fields
            const updateField = async (fieldName, value) => {
              if (!value) return;
            
              const field = targetProject.fields.nodes.find(f => f.name === fieldName);
              if (!field) {
                console.log(`⚠️ Field "${fieldName}" not found`);
                return;
              }
            
              try {
                if (field.options) {
                  // Single select
                  const option = field.options.find(opt => opt.name === value);
                  if (!option) {
                    console.log(`⚠️ Option "${value}" not found for ${fieldName}`);
                    return;
                  }
            
                  const mutation = `
                    mutation {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: "${targetProject.id}"
                        itemId: "${itemId}"
                        fieldId: "${field.id}"
                        value: { singleSelectOptionId: "${option.id}" }
                      }) {
                        projectV2Item { id }
                      }
                    }
                  `;
            
                  await github.graphql(mutation);
                  console.log(`✅ Updated ${fieldName}: ${value}`);
                } else {
                  // Text field
                  const mutation = `
                    mutation {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: "${targetProject.id}"
                        itemId: "${itemId}"
                        fieldId: "${field.id}"
                        value: { text: "${value}" }
                      }) {
                        projectV2Item { id }
                      }
                    }
                  `;
            
                  await github.graphql(mutation);
                  console.log(`✅ Updated ${fieldName}: ${value}`);
                }
              } catch (error) {
                console.log(`❌ Error updating ${fieldName}:`, error.message);
              }
            };
            
            // Update all fields
            await updateField('Project', projectValue);
            await updateField('Priority', priorityValue);
            await updateField('Affects Version', affectsVersion);
            await updateField('Fix Version', fixVersion);
            
            console.log('🎉 Done!');