name: Improvement
description: Suggest an improvement for this application
title: "_"
labels: improvement
body:
  - type: dropdown
    id: application
    attributes:
      label: Application
      description: Select the application this improvement relates to
      options:
        - eHARS
        - API
        - ADT
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a detailed description of the improvement
      placeholder: Describe the improvement in detail...
    validations:
      required: true


  - type: dropdown
    id: affects_version
    attributes:
      label: Affects Version/s
      description: Which version(s) does this affect?
      options:
        - "Release 4.16.1"
        - "Release 4.17"
        - "Release 4.18"
      default: 0

  - type: dropdown
    id: fix_version
    attributes:
      label: Fix Version/s
      description: Which version(s) should include this fix?
      options:
        - "Release 4.17"
        - "Release 4.18"
        - "Release 4.19"
        - "Release 4.20"
      default: 0


  - type: dropdown
    id: components
    attributes:
      label: Component/s
      description: Which component(s) does this relate to?
      multiple: true
      options:
        - "Requirements"
        - "All Document Import"
        - "Database"
        - "eHARS User Interface"
        - "Quality Assurance"
      default: 0
    validations:
      required: true

  - type: dropdown
    id: module_info
    attributes:
      label: Module Info
      description: Select module information
      multiple: true
      options:
        - "Usability"
        - "ACRF"
        - "Administration"
        - "ADT"
        - "Architecture"
        - "Birth"
        - "C&A"
        - "Calculated Variables"
        - "Data Conversion"
        - "Data Management"
        - "Data Storage"
        - "Data Transfer"
        - "Database"
        - "Datasets"
        - "Death"
        - "Document Deletion"
        - "Documentation/Tech Writing"
        - "Duplicates Processing"
        - "Edit Checks"
        - "Edit/Anomaly Checks"
        - "HARS Document"
        - "Importing"
        - "InstallShield"
        - "Investigation"
        - "Lab Document"
        - "MJP Ownership"
        - "Name Removal"
        - "Other"
        - "PCRF"
        - "Person View"
        - "Person View - Birth History"
        - "Person View - Calculated Variables"
        - "Person View - Children Linked to this Person"
        - "Person View - Clinical"
        - "Person View - Contacts"
        - "Person View - COPHI"
        - "Person View - Death"
        - "Person View - Demographics"
        - "Person View - Duplicate Review"
        - "Person View - Facility"
        - "Person View - Form Info"
        - "Person View - HARS Legacy Variables"
        - "Person View - Header"
        - "Person View - History"
        - "Person View - Identification"
        - "Person View - Incidence Consent"
        - "Person View - Lab Data"
        - "Person View - Local Fields"
        - "Person View - Overall"
        - "Person View - Treatment/Services"
        - "PVGen"
        - "Reports/Logs"
        - "SAS Batch Reports"
        - "Script Requests"
        - "Searching"
        - "Source Data"
        - "System Wide"
        - "Vocabulary"
        - "Vocabulary/Lookup Tables"
      default: 0

  - type: input
    id: reporter
    attributes:
      label: Reporter
      description: Who Reported this issue?
      placeholder: "i.e: Customer, Jurisdiction, etc."

  - type: input
    id: help_desk_numbers
    attributes:
      label: Help Desk Number(s)
      description: Enter help desk numbers (optional)
      placeholder: "Help desk numbers..."

  - type: textarea
    id: linked_issues
    attributes:
      label: Linked/Duplicate Issues
      description: Reference any related issues
      placeholder: "Related: #123, #456"

  - type: textarea
    id: attachments
    attributes:
      label: Attachments
      description: You can attach files directly to this issue after creating it using the attachment area at the bottom of the page.
      placeholder: "Describe any files you will attach..."
